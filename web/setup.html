<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phone ↔ Mac 控制台</title>
  <link rel="icon" href="/icon-192.png" type="image/png" />
  <style>
    :root {
      --bg: #0b1020; --fg: #d7e3ff; --muted: #7d8aa8; --accent: #4f8cff;
      --ok: #38d39f; --warn: #f5c16c; --bad: #ff6b7a; --panel: #131936;
      --btn: #1c2548; --btn-h: #2a3870; --border: #23306b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; min-height: 100vh; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px; margin-bottom: 16px; }
    .card h2 { font-size: 15px; margin: 0 0 12px; color: var(--muted); letter-spacing: 0.04em;
      text-transform: uppercase; font-weight: 600; }
    .qr-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .qr { background: #fff; padding: 12px; border-radius: 10px; width: 220px; height: 220px;
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
    .qr svg, .qr canvas { display: block; width: 100%; height: 100%; }
    .details { flex: 1 1 280px; min-width: 0; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row label { color: var(--muted); font-size: 12px; width: 72px; flex: 0 0 auto; }
    .row code, .row .val { background: #000; color: var(--fg); padding: 5px 8px; border-radius: 6px;
      font-family: "SF Mono", ui-monospace, monospace; font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; }
    .row button { background: var(--btn); color: var(--fg); border: none; padding: 5px 10px;
      border-radius: 6px; font-size: 12px; cursor: pointer; }
    .row button:hover { background: var(--btn-h); }
    .status-pill { display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-pill::before { content: ""; width: 8px; height: 8px; border-radius: 50%; }
    .pill-ok   { background: rgba(56,211,159,0.14); color: var(--ok); }
    .pill-ok::before   { background: var(--ok); }
    .pill-warn { background: rgba(245,193,108,0.14); color: var(--warn); }
    .pill-warn::before { background: var(--warn); }
    .pill-bad  { background: rgba(255,107,122,0.14); color: var(--bad); }
    .pill-bad::before  { background: var(--bad); }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.55; margin: 8px 0 0; }
    .hint code { background: #000; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
    .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 12px; font-size: 13px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-link { background: var(--btn); color: var(--fg); border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 14px; cursor: pointer; }
    .btn-link:hover { background: var(--btn-h); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #000; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Phone ↔ Mac 控制台</h1>
    <p class="sub">此页面只在本机可见。手机用下面的二维码连接。</p>

    <div class="card">
      <h2>手机连接入口</h2>
      <div class="qr-row">
        <div class="qr" id="qr"></div>
        <div class="details">
          <div class="row">
            <label>URL</label>
            <code class="val" id="phoneUrl">…</code>
            <button data-copy="phoneUrl">复制</button>
          </div>
          <div class="row">
            <label>Token</label>
            <code class="val" id="token">…</code>
            <button data-copy="token">复制</button>
          </div>
          <p class="hint" id="phoneHint">扫码即可;URL 里已经带 token,手机第一次打开就自动登入。</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>网络状态</h2>
      <dl class="kv">
        <dt>Tailscale</dt><dd id="tsStatus">检测中…</dd>
        <dt>Tailscale IP</dt><dd id="tsIp">—</dd>
        <dt>Tailscale 名</dt><dd id="tsName">—</dd>
        <dt>局域网 IP</dt><dd id="lanIp">—</dd>
        <dt>主机名</dt><dd id="hostname">—</dd>
        <dt>端口</dt><dd id="port">—</dd>
      </dl>
      <p class="hint" id="tsHint"></p>
    </div>

    <div class="card">
      <h2>操作</h2>
      <div class="actions">
        <a class="btn-primary" href="/" target="_blank">在本机打开终端</a>
        <button class="btn-link" id="btnRefresh">刷新状态</button>
        <button class="btn-link" id="btnOpenLogs">查看日志文件</button>
      </div>
      <p class="hint">
        首次使用请确认:Mac 和手机都登录同一个 Tailscale 账号,
        且手机 Tailscale 在 <b>连接状态</b>。
        关于开机自启,双击过 <code>PhoneMacBridge.app</code> 之后,launchd 已代为管理。
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/vendor/qrcode.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const toast = (t) => {
      const el = $("toast"); el.textContent = t; el.classList.add("show");
      clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove("show"), 1400);
    };

    async function copy(text) {
      try { await navigator.clipboard.writeText(text); toast("已复制"); }
      catch { toast("复制失败"); }
    }

    document.addEventListener("click", (e) => {
      const t = e.target.closest("[data-copy]");
      if (!t) return;
      const el = $(t.getAttribute("data-copy"));
      if (el) copy(el.textContent);
    });

    $("btnOpenLogs").addEventListener("click", () => {
      alert("日志位置:\n  ~/.phone-mac-bridge/bridge.out.log\n  ~/.phone-mac-bridge/bridge.err.log\n\nMac 终端里跑:\n  tail -f ~/.phone-mac-bridge/bridge.*.log");
    });

    function renderQR(text) {
      const box = $("qr"); box.innerHTML = "";
      if (typeof qrcode === "undefined") { box.textContent = "QR 库未加载"; return; }
      // qrcode-generator: type 0 = auto-pick size, L/M/Q/H = error correction level
      try {
        const qr = qrcode(0, "M");
        qr.addData(text);
        qr.make();
        // createSvgTag(cellSize=scalable)
        box.innerHTML = qr.createSvgTag({ scalable: true, margin: 1 });
        const svg = box.querySelector("svg");
        if (svg) {
          svg.setAttribute("width", "100%");
          svg.setAttribute("height", "100%");
        }
      } catch (e) {
        box.textContent = "QR 生成失败: " + e.message;
      }
    }

    function pickPhoneUrl(info) {
      // preference: Tailscale hostname (works with HTTPS if user later enables `tailscale serve`)
      //             > Tailscale IP > LAN IP > hostname
      const port = info.port;
      if (info.tailscale && info.tailscale.loggedIn && info.tailscale.ip) {
        return `http://${info.tailscale.ip}:${port}/?token=${encodeURIComponent(info.token)}`;
      }
      if (info.lan && info.lan.ip) {
        return `http://${info.lan.ip}:${port}/?token=${encodeURIComponent(info.token)}`;
      }
      return `http://${info.hostname}.local:${port}/?token=${encodeURIComponent(info.token)}`;
    }

    function renderTailscale(info) {
      const ts = info.tailscale || {};
      const hint = $("tsHint");
      if (!ts.installed) {
        $("tsStatus").innerHTML = '<span class="status-pill pill-bad">未安装</span>';
        hint.innerHTML = '请先安装 Tailscale:<code>brew install --cask tailscale-app</code> 或去 tailscale.com 下载。';
      } else if (!ts.loggedIn) {
        $("tsStatus").innerHTML = `<span class="status-pill pill-warn">已安装,未登录 (${ts.backendState || "?"})</span>`;
        hint.innerHTML = '打开 Tailscale 应用并用和手机一致的账号登录。';
      } else {
        $("tsStatus").innerHTML = '<span class="status-pill pill-ok">在线</span>';
        hint.innerHTML = '连接方式已经走 Tailscale(WireGuard 加密)。';
      }
      $("tsIp").textContent = ts.ip || "—";
      $("tsName").textContent = ts.hostname || "—";

      if (!ts.loggedIn && info.lan && info.lan.ip) {
        $("phoneHint").innerHTML = '⚠️ Tailscale 还没上线,当前二维码指向 <b>局域网 IP</b>,只在同 WiFi 下有效。装好 Tailscale 后刷新本页即可切换。';
      }
    }

    async function load() {
      let info;
      try {
        const r = await fetch("/api/info", { cache: "no-store" });
        info = await r.json();
      } catch (e) {
        $("tsStatus").textContent = "无法连接本地服务: " + e.message;
        return;
      }
      // Each panel is isolated so one failure doesn't break the rest.
      try { $("lanIp").textContent = info.lan ? `${info.lan.ip}  (${info.lan.iface})` : "未检测到"; } catch {}
      try { $("hostname").textContent = info.hostname || "—"; } catch {}
      try { $("port").textContent    = info.port ?? "—"; } catch {}
      try { $("token").textContent   = info.token || "—"; } catch {}
      let url = "";
      try { url = pickPhoneUrl(info); $("phoneUrl").textContent = url; } catch (e) { $("phoneUrl").textContent = "URL 生成失败: " + e.message; }
      try { if (url) renderQR(url); } catch (e) { $("qr").textContent = "QR 生成失败: " + e.message; }
      try { renderTailscale(info); } catch (e) { $("tsStatus").textContent = "Tailscale 渲染失败: " + e.message; }
    }

    $("btnRefresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
